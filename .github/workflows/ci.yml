name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev
      - name: Doc parity check
        run: uv run python scripts/check_doc_parity.py
      - name: Type check (lenient baseline; ratchet plan in CONTRIBUTING.md)
        run: uv run mypy awx_mcp/
        continue-on-error: true
      - name: Test
        env:
          ANSIBLE_BASE_URL: "https://awx.example.com/"
          ANSIBLE_TOKEN: "fake-token-for-ci"
          ANSIBLE_SSL_VERIFY: "false"
        run: uv run pytest tests/ -v
