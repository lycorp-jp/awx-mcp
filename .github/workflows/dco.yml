name: DCO

# Verifies every commit in a pull request carries a `Signed-off-by` trailer,
# as required by DCO.md. Self-contained — no external app or org install needed.
# Contributors sign off with: git commit -s

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            # Skip merge commits.
            if [ "$(git rev-list --no-walk --count --merges "$sha")" -eq 1 ]; then
              continue
            fi
            msg="$(git log -1 --format='%B' "$sha")"
            author="$(git log -1 --format='%an <%ae>' "$sha")"
            if ! printf '%s\n' "$msg" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha by $author is missing a 'Signed-off-by' line."
              echo "          Fix with: git rebase --signoff ${BASE_SHA} && git push --force-with-lease"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "DCO check failed. See https://github.com/lycorp-jp/awx-mcp/blob/main/DCO.md"
            exit 1
          fi
          echo "DCO check passed: all commits are signed off."
